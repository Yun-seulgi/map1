<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>매장 방문 관리</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --ink:#0f1b1a; --paper:#f4f2ec; --map-bg:#122b2a; --map-grid:#1d3f3c;
    --route:#e8823c; --route-soft:#e8823c55; --pin:#f4f2ec; --pin-current:#5fd0c0;
    --accent:#5fd0c0; --line:#26433f; --muted:#7c8d8a; --danger:#c0392b; --ok:#2e9e6d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;background:var(--paper);color:var(--ink);display:flex;justify-content:center;}
  #app{width:100%;max-width:520px;height:100vh;height:100dvh;background:var(--paper);display:flex;flex-direction:column;position:relative;overflow:hidden;}

  header{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #00000010;flex:0 0 auto;}
  header h1{font-size:15px;margin:0;font-weight:700;}
  header .sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .icon-btn{width:32px;height:32px;border-radius:9px;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-size:15px;}

  .tabbar{display:flex;border-bottom:1px solid #00000015;flex:0 0 auto;}
  .tabbar button{flex:1;padding:10px 4px;border:none;background:none;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;}
  .tabbar button.active{color:var(--ink);border-bottom-color:var(--route);}
  .tabbar button .cnt{font-size:10.5px;color:var(--muted);margin-left:2px;}

  .filterbar{border-bottom:1px solid #00000012;flex:0 0 auto;}
  .filterbar-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink);}
  .filterbar-body{display:none;padding:2px 16px 10px;}
  .filterbar-body.open{display:block;}
  .filter-group{margin-bottom:8px;}
  .filter-group .label{font-size:10.5px;color:var(--muted);margin-bottom:5px;font-weight:700;}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-size:11px;padding:5px 10px;border-radius:14px;border:1.3px solid #00000025;background:#fff;cursor:pointer;color:var(--ink);}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .filter-selects{display:flex;gap:8px;}
  .filter-selects select{flex:1;font-size:11.5px;padding:7px 6px;border-radius:8px;border:1.3px solid #00000025;background:#fff;}
  .reset-link{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;margin-top:4px;display:inline-block;}

  #mapWrap{background:var(--map-bg);position:relative;flex:6;min-height:160px;}
  #mapWrap #mapSvg{width:100%;height:100%;}
  #mapWrap .leaflet-container{background:var(--map-bg);font-family:inherit;}
  .store-pin-label{
    background:#00000070;color:#fff;font-size:9.5px;padding:1px 5px;border-radius:5px;
    white-space:nowrap;border:none;box-shadow:none;
  }
  .store-pin-label::before{display:none;}
  .route-num-icon{
    width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--pin);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
    border:2px solid var(--pin);box-shadow:0 1px 3px #00000060;
  }
  .route-num-icon.sel{background:var(--route);}
  .map-empty{position:absolute;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;color:#ffffff80;font-size:12.5px;text-align:center;padding:0 40px;pointer-events:none;}
  .map-tools{position:absolute;top:10px;left:10px;right:10px;z-index:600;display:flex;flex-wrap:wrap;gap:6px;}
  .map-tools button{padding:7px 10px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:#00000060;color:#fff;}
  .map-tools button.on{background:var(--route);color:#20120a;}
  .map-zoom-controls{position:absolute;bottom:10px;right:10px;z-index:600;display:flex;flex-direction:column;gap:6px;}
  .map-zoom-controls button{width:30px;height:30px;border-radius:8px;border:none;background:#00000060;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
  .lasso-actionbar{position:absolute;bottom:10px;left:10px;right:52px;z-index:600;background:#0f1b1aee;color:#fff;padding:8px 10px;border-radius:10px;font-size:11.5px;display:none;align-items:center;justify-content:space-between;gap:8px;}
  .lasso-actionbar.show{display:flex;}
  .lasso-actionbar button{background:var(--route);color:#20120a;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;}
  .lasso-actionbar .clearsel{background:none;color:#fff;text-decoration:underline;cursor:pointer;}

  #listWrap{flex:4;overflow-y:auto;padding:6px 0 8px;min-height:120px;}
  .list-empty{padding:36px 24px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;}
  .date-group-header{padding:8px 16px 4px;font-size:11.5px;font-weight:800;color:var(--ink);background:#00000006;position:sticky;top:0;}
  .card{display:flex;gap:10px;padding:10px 16px;align-items:flex-start;cursor:pointer;}
  .card.dragging{opacity:0.35;}
  .card-placeholder{height:2px;background:var(--route);margin:4px 16px;border-radius:2px;}
  .route-badge{width:20px;height:20px;border-radius:50%;background:var(--ink);color:var(--paper);font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .drag-handle{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;cursor:grab;touch-action:none;background:none;border:none;}
  .card input[type=checkbox]{width:19px;height:19px;margin-top:2px;flex:0 0 auto;}
  .card-body{flex:1;min-width:0;}
  .card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .card-name{font-size:14px;font-weight:700;}
  .badge{font-size:9.5px;padding:2px 6px;border-radius:6px;font-weight:700;}
  .badge.open{background:#2e9e6d22;color:var(--ok);}
  .badge.closed{background:#c0392b22;color:var(--danger);}
  .badge.fr{background:#5fd0c022;color:#227a6d;}
  .badge.claimed{background:#00000012;color:var(--muted);}
  .card-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .card-stats{font-size:11px;color:var(--ink);margin-top:3px;display:flex;gap:10px;}
  .card-actions{flex:0 0 auto;display:flex;flex-direction:column;gap:6px;align-items:stretch;}
  .card-actions button{border:none;border-radius:8px;padding:7px 9px;font-size:10.5px;font-weight:700;cursor:pointer;background:var(--ink);color:var(--paper);white-space:nowrap;}
  .card-actions .undo{background:#00000012;color:var(--ink);}
  .gmap-card-btn{border:none;border-radius:8px;padding:7px 9px;font-size:10.5px;font-weight:700;cursor:pointer;background:#1a73e8;color:#fff;text-decoration:none;text-align:center;white-space:nowrap;}

  #bulkBar{position:sticky;bottom:0;background:var(--ink);color:var(--paper);display:none;align-items:center;justify-content:space-between;padding:10px 16px calc(10px + env(safe-area-inset-bottom));flex:0 0 auto;}
  #bulkBar.show{display:flex;}
  #bulkBar button{background:var(--route);color:#20120a;border:none;border-radius:10px;padding:9px 13px;font-size:12.5px;font-weight:700;cursor:pointer;}
  #bulkBar .cancel{background:none;color:var(--paper);text-decoration:underline;font-weight:600;cursor:pointer;border:none;font-size:12px;padding:0;}

  #modalBg{position:absolute;left:0;right:0;bottom:0;top:0;background:#00000060;display:none;align-items:flex-end;justify-content:center;z-index:25;}
  #modalBg.open{display:flex;}
  #modal{width:100%;max-width:520px;max-height:100%;overflow-y:auto;background:var(--paper);border-radius:18px 18px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));}
  #modal h3{margin:0 0 12px;font-size:15px;display:flex;justify-content:space-between;align-items:center;}
  #modal h3 .x{cursor:pointer;color:var(--muted);font-size:18px;}
  #modal input, #modal select{width:100%;padding:10px 11px;margin-bottom:8px;border:1.5px solid #00000020;border-radius:10px;font-size:13.5px;background:#fff;}
  #modal .row2{display:flex;gap:8px;}
  #modal .row2 > *{flex:1;}
  #modal .modal-actions{display:flex;gap:8px;margin-top:6px;}
  #modal .modal-actions button{flex:1;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}
  #modal .cancel{background:#00000010;color:var(--ink);}
  #modal .confirm{background:var(--ink);color:var(--paper);}

  .detail-row{display:flex;padding:7px 0;border-bottom:1px solid #00000008;font-size:13px;gap:10px;}
  .detail-row .k{flex:0 0 78px;color:var(--muted);font-weight:700;font-size:11.5px;}
  .detail-row .v{flex:1;word-break:break-all;}
  .detail-row a{color:#1a73e8;text-decoration:none;font-weight:600;}
  .detail-actions{display:flex;gap:8px;margin-top:12px;}
  .detail-actions button{flex:1;padding:11px;border:none;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer;background:var(--ink);color:var(--paper);}

  #toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:20px;font-size:12px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:30;max-width:88%;text-align:center;}
  #toast.show{opacity:1;}
</style>
</head>
<body>

  <div id="nameGateBg" style="position:fixed;inset:0;z-index:1000;background:var(--paper);display:flex;align-items:center;justify-content:center;padding:24px;">

      <span class="reset-link" id="resetFilters">필터 초기화</span>

  <div id="mapWrap">
    <div id="mapSvg"></div>

  const firebaseConfig = {
    apiKey: "AIzaSyA9GwOvhiKgivI_bQ7CLfjNXdYOoF7UrYM",
    authDomain: "map1-75007.firebaseapp.com",
    projectId: "map1-75007",
    storageBucket: "map1-75007.firebasestorage.app",
    messagingSenderId: "737801614934",
    appId: "1:737801614934:web:dfcf2a5c7cb86a9ee02df7",
    measurementId: "G-MMZ7CC7Z0K"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.fsDoc = doc;
  window.fsSetDoc = setDoc;
  window.fsDeleteDoc = deleteDoc;
  window.fsWriteBatch = writeBatch;

  // Firebase 실시간 수신 설정
  onSnapshot(collection(db, "stores"), (snapshot) => {
    let newStores = [];
    snapshot.forEach((doc) => {

<script>
(function(){
"use strict";

window.stores = [];
var currentLoc = null;
var currentUser = null;
var unvisitedOnly = true;
var activeTab = 'unassigned';
var selected = new Set();
var lastVisibleList = [];
var lassoSelected = new Set();
var filters = {regions:new Set(), categories:new Set(), statuses:new Set(), franchise:new Set(), ratingMin:0, reviewMin:0, sort:'rating_desc'};
var userZoomed = false;
var lassoMode = false;
var pickRefMode = false;

var appEl = document.getElementById('app');
var listWrap = document.getElementById('listWrap');
var listEmpty = document.getElementById('listEmpty');
var mapEmpty = document.getElementById('mapEmpty');
var mapTools = document.getElementById('mapTools');
var zoomControls = document.getElementById('zoomControls');
var bulkBar = document.getElementById('bulkBar');
var lassoActionbar = document.getElementById('lassoActionbar');

function uid(){ return 's'+Math.random().toString(36).slice(2,9); }
function todayStr(){ return new Date().toLocaleDateString('sv-SE'); }
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(function(){t.classList.remove('show');}, 2200);
}

// Firebase 데이터베이스 연동 함수
async function saveStoreToDB(storeData) {
  if (window.db) {
    var id = storeData.id || uid();
    storeData.id = id;
    await window.fsSetDoc(window.fsDoc(window.db, "stores", id), storeData, { merge: true });
  }
}

async function saveMultipleStoresToDB(storesArr) {
  if (window.db && storesArr.length > 0) {
    var batch = window.fsWriteBatch(window.db);
    storesArr.forEach(function(s) {
      if (!s.id) s.id = uid();
      var ref = window.fsDoc(window.db, "stores", s.id);
      batch.set(ref, s, { merge: true });
    });
    await batch.commit();
  }
}

function haversineKm(a,b){
  var R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  var lat1=a.lat*Math.PI/180, lat2=b.lat*Math.PI/180;
  var h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function gmapDirUrl(s){
  return 'https://www.google.com/maps/dir/?api=1&destination='+s.lat+','+s.lng;
}

// ---------- filter chip data ----------
function uniqueVals(arr, key){
  var seen = {}, out = [];
  arr.forEach(function(s){ var v=(s[key]||'').trim(); if(v && !seen[v]){seen[v]=1; out.push(v);} });
  return out;
}
function renderChips(containerId, values, selectedSet){
  var el = document.getElementById(containerId);
  el.innerHTML = '';
  values.forEach(function(v){
    var chip = document.createElement('span');
    chip.className = 'chip' + (selectedSet.has(v) ? ' on' : '');
    chip.textContent = v;
    chip.addEventListener('click', function(){
      if(selectedSet.has(v)) selectedSet.delete(v); else selectedSet.add(v);
      render();
    });
    el.appendChild(chip);
  });
}

// ---------- filtering / sorting ----------
function tabStores(tab){
  var stores = window.stores;
  if(tab === 'unassigned'){
    return unvisitedOnly
      ? stores.filter(function(s){ return s.visitStatus === 'unassigned'; })
      : stores.slice();
  }
  if(tab === 'today'){
    return stores.filter(function(s){ return s.visitStatus === 'today' && s.assignee === currentUser; });
  }
  return stores.filter(function(s){ return s.visitStatus === tab; });
}
function filterOnly(list){
  return list.filter(function(s){
    if(filters.regions.size && !filters.regions.has(s.region)) return false;
    if(filters.categories.size && !filters.categories.has(s.category)) return false;
    if(filters.statuses.size && !filters.statuses.has(s.status)) return false;
    if(filters.franchise.size && !filters.franchise.has(s.franchise)) return false;
    if(filters.ratingMin && (parseFloat(s.rating)||0) < filters.ratingMin) return false;
    if(filters.reviewMin && (parseInt(s.reviewCount)||0) < filters.reviewMin) return false;
    return true;
  });
}
function applyFilters(list){
  return filterOnly(list).sort(function(a,b){
    if(filters.sort==='rating_desc') return (parseFloat(b.rating)||0)-(parseFloat(a.rating)||0);
    if(filters.sort==='rating_asc') return (parseFloat(a.rating)||0)-(parseFloat(b.rating)||0);
    if(filters.sort==='review_desc') return (parseInt(b.reviewCount)||0)-(parseInt(a.reviewCount)||0);
    if(filters.sort==='review_asc') return (parseInt(a.reviewCount)||0)-(parseInt(b.reviewCount)||0);
    if(filters.sort==='name_asc') return (a.name||'').localeCompare(b.name||'');
    return 0;
  });
}
function ensureOrder(list){
  var withOrder = list.filter(function(s){return s.routeOrder;}).sort(function(a,b){return a.routeOrder-b.routeOrder;});
  var withoutOrder = list.filter(function(s){return !s.routeOrder;});
  var maxOrder = withOrder.length ? withOrder[withOrder.length-1].routeOrder : 0;
  withoutOrder.forEach(function(s,i){ s.routeOrder = maxOrder+i+1; });
  return withOrder.concat(withoutOrder);
}

function attachDragToday(row, storeId){
  var handle = row.querySelector('.drag-handle');
  if(!handle) return;
  var dragging = false, placeholder = null;

  handle.addEventListener('pointerdown', function(e){
    e.preventDefault();
    dragging = true;
    row.classList.add('dragging');
    try{ handle.setPointerCapture(e.pointerId); }catch(err){}

    placeholder = document.createElement('div');
    placeholder.className = 'card-placeholder';
    row.parentNode.insertBefore(placeholder, row.nextSibling);

    function onMove(ev){
      if(!dragging) return;
      var rows = Array.prototype.slice.call(listWrap.querySelectorAll('.card'));
      var y = ev.clientY;
      for(var i=0;i<rows.length;i++){
        var r = rows[i];
        if(r === row) continue;
        var rect = r.getBoundingClientRect();
        if(y > rect.top && y < rect.bottom){
          var before = y < (rect.top+rect.bottom)/2;
          r.parentNode.insertBefore(placeholder, before ? r : r.nextSibling);
          break;
        }
      }
    }
    function onUp(){
      dragging = false;
      row.classList.remove('dragging');
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);

      var domNodes = Array.prototype.slice.call(listWrap.children);
      var newOrderIds = [];
      domNodes.forEach(function(n){
        if(n === placeholder) newOrderIds.push(storeId);
        else if(n !== row && n.classList && n.classList.contains('card') && n.dataset.storeId) newOrderIds.push(n.dataset.storeId);
      });
      if(placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);

      var updatedBatch = [];
      newOrderIds.forEach(function(id, i){
        var s = window.stores.find(function(x){ return x.id === id; });
        if(s) {
          s.routeOrder = i+1;
          updatedBatch.push(s);
        }
      });
      saveMultipleStoresToDB(updatedBatch);
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}

// ================= MAP (Leaflet) =================
var map = null;
var markersLayer = null;
var routeLayer = null;
var currentMarkerData = [];
var suppressAutoFit = false;
var lassoLayer = null;
var lassoLatLngs = [];

function initMapControls(){
  map = L.map('mapSvg', {
    zoomControl: false,
    attributionControl: true,
    center: [-33.8688, 151.2093], // 시드니 중심 좌표 기본값
    zoom: 12
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  routeLayer = L.layerGroup().addTo(map);

  map.on('dragstart', function(){ userZoomed = true; });
  map.on('zoomstart', function(){ if(!suppressAutoFit) userZoomed = true; });
  map.on('zoomend', updateMarkerRadii);

  var container = map.getContainer();

  container.addEventListener('pointerdown', function(e){
    if(!lassoMode) return;
    e.preventDefault();
    try{ container.setPointerCapture(e.pointerId); }catch(err){}
    lassoLatLngs = [map.mouseEventToLatLng(e)];
    lassoLayer = L.polygon([lassoLatLngs], {color:'#e8823c', weight:2, fillColor:'#e8823c', fillOpacity:0.22}).addTo(map);
  });
  container.addEventListener('pointermove', function(e){
    if(!lassoMode || !lassoLayer) return;
    lassoLatLngs.push(map.mouseEventToLatLng(e));
    lassoLayer.setLatLngs(lassoLatLngs);
  });
  function finishLasso(){
    if(!lassoMode || !lassoLayer) return;
    if(lassoLatLngs.length > 2){
      currentMarkerData.forEach(function(item){
        if(item.store.visitStatus === 'unassigned' && pointInPolygonLatLng(item.latlng, lassoLatLngs)) lassoSelected.add(item.store.id);
      });
      render();
    }
    map.removeLayer(lassoLayer);
    lassoLayer = null; lassoLatLngs = [];
  }
  container.addEventListener('pointerup', finishLasso);
  container.addEventListener('pointercancel', finishLasso);

  map.on('click', function(e){
    if(pickRefMode){
      currentLoc = {lat: e.latlng.lat, lng: e.latlng.lng};
      pickRefMode = false;
      map.dragging.enable();
      container.style.cursor = '';
      render();
      toast('기준 위치를 지정했어요');
    }
  });

  document.getElementById('zoomInBtn').addEventListener('click', function(){ map.zoomIn(); });
  document.getElementById('zoomOutBtn').addEventListener('click', function(){ map.zoomOut(); });
  document.getElementById('zoomResetBtn').addEventListener('click', function(){ userZoomed = false; render(); toast('지도를 전체보기로 맞췄어요'); });
}

function pointInPolygonLatLng(pt, poly){
  var inside = false;
  for(var i=0,j=poly.length-1;i<poly.length;j=i++){
    var xi=poly[i].lng, yi=poly[i].lat, xj=poly[j].lng, yj=poly[j].lat;
    var x=pt.lng, y=pt.lat;
    var intersect = ((yi>y) !== (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}

function pinRadius(){
  if(!map) return 9;
  var z = map.getZoom();
  return Math.max(4, Math.min(11, 15 - (z - 11)));
}

function updateMarkerRadii(){
  var r = pinRadius();
  currentMarkerData.forEach(function(item){
    if(item.marker.setRadius) item.marker.setRadius(r);
  });
}

function fitToData(latlngs){
  if(!map || latlngs.length === 0) return;
  suppressAutoFit = true;
  if(latlngs.length === 1){ map.setView(latlngs[0], 15); }
  else { map.fitBounds(L.latLngBounds(latlngs), {padding:[30,30], maxZoom:16}); }
  setTimeout(function(){ suppressAutoFit = false; }, 60);
}

function renderMap(visible){
  markersLayer.clearLayers();
  routeLayer.clearLayers();
  currentMarkerData = [];

  var all = currentLoc ? [currentLoc].concat(visible) : visible.slice();
  if(all.length === 0){
    mapEmpty.style.display='flex'; zoomControls.style.display='none';
    lassoActionbar.classList.remove('show');
    renderMapTools();
    return;
  }
  mapEmpty.style.display='none';
  zoomControls.style.display='flex';

  var radius = pinRadius();

  if(currentLoc){
    L.circleMarker([currentLoc.lat, currentLoc.lng], {
      radius: 8, color:'#5fd0c0', weight:3, fillColor:'#5fd0c0', fillOpacity:0.9
    }).addTo(markersLayer);
  }

  var orderedForRoute = [];

  visible.forEach(function(s){
    var latlng = [s.lat, s.lng];
    var isSel = lassoSelected.has(s.id) || selected.has(s.id);
    var showNumber = activeTab === 'today' && s.routeOrder;
    var marker;
    if(showNumber){
      var icon = L.divIcon({
        className: '',
        html: '<div class="route-num-icon'+(isSel?' sel':'')+'">'+s.routeOrder+'</div>',
        iconSize: [22,22], iconAnchor:[11,11]
      });
      marker = L.marker(latlng, {icon: icon});
      orderedForRoute.push({order:s.routeOrder, latlng:latlng});
    } else {
      var isClaimedElsewhere = activeTab === 'unassigned' && s.visitStatus !== 'unassigned';
      marker = L.circleMarker(latlng, {
        radius: radius, color:'#f4f2ec', weight:2,
        fillColor: isSel ? '#e8823c' : (isClaimedElsewhere ? '#7c8d8a' : '#0f1b1a'),
        fillOpacity: isClaimedElsewhere ? 0.6 : 1
      });
    }
    marker.addTo(markersLayer);
    marker.bindTooltip(s.name, {permanent:true, direction:'top', offset:[0,-6], className:'store-pin-label'});
    marker.on('click', function(){ if(!lassoMode && !pickRefMode) openDetail(s); });
    currentMarkerData.push({store:s, marker:marker, latlng:{lat:s.lat, lng:s.lng}});
  });

  if(activeTab === 'today' && orderedForRoute.length > 0){
    orderedForRoute.sort(function(a,b){ return a.order-b.order; });
    var pts = [];
    if(currentLoc) pts.push([currentLoc.lat, currentLoc.lng]);
    orderedForRoute.forEach(function(o){ pts.push(o.latlng); });
    if(pts.length > 1){
      L.polyline(pts, {color:'#e8823c', weight:3, dashArray:'7 6'}).addTo(routeLayer);
    }
  }

  if(!userZoomed){
    var latlngs = all.map(function(p){ return [p.lat, p.lng]; });
    fitToData(latlngs);
  }
  renderLassoBar();
  renderMapTools();
}

function renderLassoBar(){
  if(lassoSelected.size > 0){
    lassoActionbar.classList.add('show');
    document.getElementById('lassoCount').textContent = lassoSelected.size+'곳 선택됨';
  } else {
    lassoActionbar.classList.remove('show');
  }
}
document.getElementById('lassoClear').addEventListener('click', function(){ lassoSelected.clear(); render(); });
document.getElementById('lassoAddToday').addEventListener('click', function(){
  var updatedStores = [];
  lassoSelected.forEach(function(id){
    var s = window.stores.find(function(x){return x.id===id;});
    if(s && s.visitStatus === 'unassigned'){ 
      s.visitStatus = 'today'; 
      s.assignee = currentUser; 
      updatedStores.push(s);
    }
  });
  saveMultipleStoresToDB(updatedStores);
  toast(lassoSelected.size+'곳을 오늘 방문 리스트로 옮겼어요');
  lassoSelected.clear();
});

function renderMapTools(){
  if(window.stores.length === 0){ mapTools.style.display = 'none'; return; }
  if(activeTab === 'unassigned'){
    mapTools.style.display = 'flex';
    mapTools.innerHTML = '<button id="lassoBtn" class="'+(lassoMode?'on':'')+'">✏️ 범위 선택</button>';
    document.getElementById('lassoBtn').addEventListener('click', toggleLasso);
  } else if(activeTab === 'today'){
    mapTools.style.display = 'flex';
    mapTools.innerHTML =
      '<button id="useCurrentLocBtn">📍 현재 위치</button>'+
      '<button id="pickRefBtn" class="'+(pickRefMode?'on':'')+'">🎯 출발지 선택</button>'+
      '<button id="optimizeBtn">🧭 동선 최적화</button>'+
      '<button id="resetTodayBtn">🗑 리스트 초기화</button>';
    document.getElementById('useCurrentLocBtn').addEventListener('click', useCurrentLocation);
    document.getElementById('pickRefBtn').addEventListener('click', togglePickRef);
    document.getElementById('optimizeBtn').addEventListener('click', optimizeRouteToday);
    document.getElementById('resetTodayBtn').addEventListener('click', resetTodayList);
  } else {
    mapTools.style.display = 'none';
  }
}

function toggleLasso(){
  lassoMode = !lassoMode;
  pickRefMode = false;
  if(map){ if(lassoMode) map.dragging.disable(); else map.dragging.enable(); }
  var container = map ? map.getContainer() : document.getElementById('mapSvg');
  container.style.cursor = lassoMode ? 'crosshair' : '';
  toast(lassoMode ? '지도 위에 드래그해서 범위를 그려보세요' : '범위 선택 모드를 종료했어요');
  renderMapTools();
}

function togglePickRef(){
  pickRefMode = !pickRefMode;
  lassoMode = false;
  if(map) map.dragging.enable();
  var container = map ? map.getContainer() : document.getElementById('mapSvg');
  container.style.cursor = pickRefMode ? 'crosshair' : '';
  toast(pickRefMode ? '지도를 탭해서 기준 위치를 지정하세요' : '기준위치 선택 모드를 종료했어요');
  renderMapTools();
}

function useCurrentLocation(){
  if(!navigator.geolocation){ toast('이 브라우저는 위치 정보를 지원하지 않아요'); return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    currentLoc = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    render();
    toast('현재 위치를 기준 위치로 설정했어요');
  }, function(){ toast('위치 확인에 실패했어요'); });
}

function resetTodayList(){
  var list = tabStores('today');
  if(list.length === 0){ toast('오늘 방문 리스트가 이미 비어있어요'); return; }
  list.forEach(function(s){ s.visitStatus = 'unassigned'; delete s.routeOrder; });
  saveMultipleStoresToDB(list);
  selected.clear();
  toast('오늘 방문 리스트를 초기화했어요 ('+list.length+'곳을 전체 매장으로 되돌림)');
}

function optimizeRouteToday(){
  if(!currentLoc){ toast('먼저 기준 위치를 설정해주세요 (📍 현재 위치 또는 🎯 출발지 선택)'); return; }
  var list = applyFilters(tabStores('today'));
  if(list.length === 0){ toast('오늘 방문 리스트가 비어있어요'); return; }
  var remaining = list.slice();
  var order = [], cursor = currentLoc;
  while(remaining.length){
    var bestIdx=0, bestDist=Infinity;
    for(var i=0;i<remaining.length;i++){
      var d = haversineKm(cursor, remaining[i]);
      if(d < bestDist){ bestDist = d; bestIdx = i; }
    }
    var next = remaining.splice(bestIdx,1)[0];
    order.push(next);
    cursor = next;
  }
  order.forEach(function(s,i){ s.routeOrder = i+1; });
  saveMultipleStoresToDB(order);
  toast('기준 위치 기준으로 최적 동선을 계산했어요 ('+order.length+'곳)');
}

document.getElementById('unvisitedOnlyCheckbox').addEventListener('change', function(e){
  unvisitedOnly = e.target.checked;
  render();
});

// ---------- 담당자(이름) 식별 ----------
var nameGateBg = document.getElementById('nameGateBg');
var userBadge = document.getElementById('userBadge');

function showNameGate(prefill){
  document.getElementById('nameGateInput').value = prefill || '';
  nameGateBg.style.display = 'flex';
  setTimeout(function(){ document.getElementById('nameGateInput').focus(); }, 50);
}
function hideNameGate(){ nameGateBg.style.display = 'none'; }
function updateUserBadge(){ userBadge.textContent = '담당자: ' + (currentUser || '-') + ' (변경)'; }

document.getElementById('nameGateConfirm').addEventListener('click', function(){
  var name = document.getElementById('nameGateInput').value.trim();
  if(!name){ toast('이름을 입력해주세요'); return; }
  currentUser = name;
  try{ localStorage.setItem('storeVisitManager_user', name); }catch(e){}
  hideNameGate();
  updateUserBadge();
  render();
});
document.getElementById('nameGateInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('nameGateConfirm').click();
});
userBadge.addEventListener('click', function(){ showNameGate(currentUser); });

(function initUser(){
  var saved = null;
  try{ saved = localStorage.getItem('storeVisitManager_user'); }catch(e){}
  if(saved){
    currentUser = saved;
    hideNameGate();
    updateUserBadge();
  } else {
    showNameGate();
  }
})();

initMapControls();

})();
</script>
</body>
</html>
