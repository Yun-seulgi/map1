<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>매장 방문 관리 — 관리자</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#0f1b1a; --paper:#f4f2ec; --accent:#5fd0c0; --route:#e8823c;
    --muted:#7c8d8a; --line:#00000014; --danger:#c0392b; --ok:#2e9e6d;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;background:var(--paper);color:var(--ink);}
  header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header h1{font-size:18px;margin:0;font-weight:800;}
  header .sub{font-size:12px;color:var(--muted);margin-top:2px;}

  .toolbar{padding:14px 24px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap;}
  .toolbar button, .toolbar label{
    font-size:12.5px;font-weight:700;padding:9px 13px;border-radius:9px;border:1.5px solid var(--ink);
    background:#fff;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  }
  .toolbar button.primary{background:var(--ink);color:var(--paper);}
  .toolbar button.danger{border-color:var(--danger);color:var(--danger);}
  .toolbar input[type=file]{display:none;}

  .filters{padding:12px 24px;border-bottom:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .filters input, .filters select{padding:8px 10px;border-radius:8px;border:1.3px solid #00000025;font-size:12.5px;background:#fff;}
  .filters input[type=text]{min-width:220px;}
  .summary{font-size:12px;color:var(--muted);margin-left:auto;}

  .table-wrap{padding:0 24px 40px;overflow-x:auto;}
  table{border-collapse:collapse;width:100%;min-width:1400px;font-size:12.5px;margin-top:14px;}
  th, td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;}
  th{background:#00000006;font-size:11px;color:var(--muted);font-weight:700;position:sticky;top:0;}
  td.wrap{white-space:normal;max-width:220px;}
  tr:hover td{background:#00000004;}

  .badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700;display:inline-block;}
  .badge.unassigned{background:#00000010;color:var(--muted);}
  .badge.today{background:#e8823c22;color:#a55217;}
  .badge.done{background:#2e9e6d22;color:var(--ok);}
  .stars{color:var(--route);}

  .row-actions{display:flex;gap:6px;}
  .row-actions button{font-size:10.5px;padding:5px 8px;border-radius:6px;border:1px solid #00000020;background:#fff;cursor:pointer;}
  .row-actions button.danger{color:var(--danger);border-color:var(--danger);}

  #toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:20px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  #toast.show{opacity:1;}

  #modalBg{position:fixed;inset:0;background:#00000060;display:none;align-items:center;justify-content:center;z-index:60;}
  #modalBg.open{display:flex;}
  #modal{width:100%;max-width:480px;max-height:86vh;overflow-y:auto;background:var(--paper);border-radius:16px;padding:20px;}
  #modal h3{margin:0 0 14px;font-size:15px;}
  #modal input, #modal select{width:100%;padding:10px 11px;margin-bottom:8px;border:1.5px solid #00000020;border-radius:9px;font-size:13.5px;background:#fff;}
  #modal .row2{display:flex;gap:8px;}
  #modal .row2 > *{flex:1;}
  #modal .modal-actions{display:flex;gap:8px;margin-top:8px;}
  #modal .modal-actions button{flex:1;padding:11px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;}
  #modal .cancel{background:#00000010;color:var(--ink);}
  #modal .confirm{background:var(--ink);color:var(--paper);}
</style>
</head>
<body>

<header>
  <div>
    <h1>매장 방문 관리 — 관리자</h1>
    <div class="sub" id="summaryLine">매장 0곳 불러오는 중...</div>
  </div>
  <div class="sub">모바일 화면은 <a href="/">여기</a></div>
</header>

<div class="toolbar">
  <label class="primary">📄 엑셀로 매장 등록<input type="file" id="fileInput" accept=".xlsx,.xls,.csv"></label>
  <button id="templateBtn">⬇ 업로드 양식 다운로드</button>
  <button id="exportBtn">⬇ 전체 현황 다운로드</button>
  <button id="addBtn">+ 매장 직접 추가</button>
  <button id="refreshBtn">↻ 새로고침</button>
  <button id="clearBtn" class="danger">전체 삭제</button>
</div>

<div class="filters">
  <input type="text" id="searchInput" placeholder="상호/지역/주소 검색">
  <select id="statusFilter">
    <option value="">상태 전체</option>
    <option value="unassigned">미방문</option>
    <option value="today">오늘 방문 예정</option>
    <option value="done">방문완료</option>
  </select>
  <select id="assigneeFilter"><option value="">담당자 전체</option></select>
  <span class="summary" id="filteredSummary"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>상태</th><th>담당자</th><th>지역</th><th>상호</th><th>업종</th><th class="wrap">주소</th>
        <th>전화번호</th><th>영업상태</th><th>평점</th><th>리뷰수</th><th>프랜차이즈</th>
        <th>방문일</th><th>반응</th><th class="wrap">메모</th><th>액션</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="toast"></div>

<div id="modalBg"><div id="modal"></div></div>

<!-- Firebase 공통 설정 파일 연결 -->
<script type="module" src="./firebase-config.js"></script>

<script>
(function(){
"use strict";

window.stores = [];
var modalBg = document.getElementById('modalBg');
var modal = document.getElementById('modal');

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(function(){t.classList.remove('show');}, 2400);
}
function uid(){ return 's'+Math.random().toString(36).slice(2,9); }
function closeModal(){ modalBg.classList.remove('open'); }
modalBg.addEventListener('click', function(e){ if(e.target===modalBg) closeModal(); });

// Firebase 데이터베이스 헬퍼 함수들
async function saveStoreToDB(storeData) {
  if (window.db) {
    var id = storeData.id || uid();
    storeData.id = id;
    await window.fsSetDoc(window.fsDoc(window.db, "stores", id), storeData, { merge: true });
  }
}

async function removeStoreFromDB(id) {
  if (window.db) {
    await window.fsDeleteDoc(window.fsDoc(window.db, "stores", id));
  }
}

async function saveMultipleStoresToDB(storesArr) {
  if (window.db && storesArr.length > 0) {
    var batch = window.fsWriteBatch(window.db);
    storesArr.forEach(function(s) {
      if (!s.id) s.id = uid();
      var ref = window.fsDoc(window.db, "stores", s.id);
      batch.set(ref, s, { merge: true });
    });
    await batch.commit();
  }
}

async function clearAllStoresFromDB() {
  if (window.db && window.stores.length > 0) {
    var batch = window.fsWriteBatch(window.db);
    window.stores.forEach(function(s) {
      var ref = window.fsDoc(window.db, "stores", s.id);
      batch.delete(ref);
    });
    await batch.commit();
  }
}

// OpenStreetMap (Nominatim) 기반 직접 지오코딩 (Vercel 호환)
var geocodeCache = {};
function sleep(ms){ return new Promise(function(r){setTimeout(r,ms);}); }
async function geocodeAddress(address){
  var key = address.trim().toLowerCase();
  if(geocodeCache[key]) return geocodeCache[key];
  try{
    var resp = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(address));
    if(!resp.ok) return null;
    var data = await resp.json();
    if(data && data.length > 0){
      var result = {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
      geocodeCache[key] = result;
      return result;
    }
  }catch(e){}
  return null;
}

// ---------- render ----------
function render(){
  var stores = window.stores;
  document.getElementById('summaryLine').textContent = '매장 '+stores.length+'곳';

  var assignees = Array.from(new Set(stores.map(function(s){return s.assignee;}).filter(Boolean)));
  var assigneeSel = document.getElementById('assigneeFilter');
  var currentVal = assigneeSel.value;
  assigneeSel.innerHTML = '<option value="">담당자 전체</option>' +
    assignees.map(function(a){ return '<option value="'+a+'">'+a+'</option>'; }).join('');
  assigneeSel.value = currentVal;

  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var statusF = document.getElementById('statusFilter').value;
  var assigneeF = document.getElementById('assigneeFilter').value;

  var filtered = stores.filter(function(s){
    if(statusF && s.visitStatus !== statusF) return false;
    if(assigneeF && s.assignee !== assigneeF) return false;
    if(q){
      var hay = [s.name,s.region,s.address].join(' ').toLowerCase();
      if(hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  document.getElementById('filteredSummary').textContent = filtered.length+' / '+stores.length+'곳 표시 중';

  var statusLabel = {unassigned:'미방문', today:'오늘 방문', done:'방문완료'};
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  filtered.forEach(function(s){
    var tr = document.createElement('tr');
    var stars = s.visitRating ? '★'.repeat(s.visitRating)+'☆'.repeat(5-s.visitRating) : '-';
    tr.innerHTML =
      '<td><span class="badge '+(s.visitStatus||'unassigned')+'">'+(statusLabel[s.visitStatus]||'미방문')+'</span></td>'+
      '<td>'+(s.assignee||'-')+'</td>'+
      '<td>'+(s.region||'-')+'</td>'+
      '<td>'+(s.name||'-')+'</td>'+
      '<td>'+(s.category||'-')+'</td>'+
      '<td class="wrap">'+(s.address||'-')+'</td>'+
      '<td>'+(s.phone||'-')+'</td>'+
      '<td>'+(s.status||'-')+'</td>'+
      '<td>'+(s.rating||'-')+'</td>'+
      '<td>'+(s.reviewCount||'0')+'</td>'+
      '<td>'+(s.franchise==='Y'?'Y':'N')+'</td>'+
      '<td>'+(s.visitDate||'-')+'</td>'+
      '<td class="stars">'+stars+'</td>'+
      '<td class="wrap">'+(s.visitMemo||'-')+'</td>'+
      '<td></td>';
    var actionsTd = tr.lastElementChild;
    var actions = document.createElement('div');
    actions.className = 'row-actions';

    if(s.visitStatus && s.visitStatus !== 'unassigned'){
      var unclaim = document.createElement('button');
      unclaim.textContent = '미방문으로';
      unclaim.addEventListener('click', function(){
        s.visitStatus = 'unassigned'; s.assignee = null; s.visitDate = null;
        s.visitRating = null; s.visitMemo = ''; delete s.routeOrder;
        saveStoreToDB(s);
        toast(s.name+' 을(를) 미방문 상태로 되돌렸어요');
      });
      actions.appendChild(unclaim);
    }
    var editBtn = document.createElement('button');
    editBtn.textContent = '수정';
    editBtn.addEventListener('click', function(){ openEditModal(s); });
    actions.appendChild(editBtn);

    var delBtn = document.createElement('button');
    delBtn.className = 'danger';
    delBtn.textContent = '삭제';
    delBtn.addEventListener('click', function(){
      if(!confirm(s.name+' 을(를) 삭제할까요? 되돌릴 수 없어요.')) return;
      removeStoreFromDB(s.id);
      toast('삭제했어요');
    });
    actions.appendChild(delBtn);

    actionsTd.appendChild(actions);
    tbody.appendChild(tr);
  });
}
window.renderApp = render;

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('assigneeFilter').addEventListener('change', render);
document.getElementById('refreshBtn').addEventListener('click', function(){ render(); toast('최신 데이터를 불러왔어요'); });

// ---------- add / edit modal ----------
function storeFormHtml(s){
  s = s || {};
  return (
    '<div class="row2"><input id="fRegion" placeholder="지역" value="'+(s.region||'')+'"><input id="fCategory" placeholder="업종" value="'+(s.category||'')+'"></div>'+
    '<input id="fName" placeholder="상호명" value="'+(s.name||'')+'">'+
    '<input id="fAddress" placeholder="주소" value="'+(s.address||'')+'">'+
    '<div class="row2"><input id="fEmail" placeholder="이메일" value="'+(s.email||'')+'"><input id="fPhone" placeholder="전화번호" value="'+(s.phone||'')+'"></div>'+
    '<input id="fGmap" placeholder="구글지도링크" value="'+(s.gmapLink||'')+'">'+
    '<div class="row2">'+
      '<select id="fStatus"><option value="영업중" '+(s.status==='영업중'?'selected':'')+'>영업중</option><option value="임시휴업" '+(s.status==='임시휴업'?'selected':'')+'>임시휴업</option></select>'+
      '<select id="fFranchise"><option value="N" '+(s.franchise!=='Y'?'selected':'')+'>프랜차이즈 아님</option><option value="Y" '+(s.franchise==='Y'?'selected':'')+'>프랜차이즈</option></select>'+
    '</div>'+
    '<div class="row2"><input id="fRating" placeholder="평점" value="'+(s.rating||'')+'"><input id="fReview" placeholder="리뷰수" value="'+(s.reviewCount||'')+'"></div>'
  );
}

document.getElementById('addBtn').addEventListener('click', function(){
  modal.innerHTML = '<h3>매장 직접 추가</h3>' + storeFormHtml() +
    '<div class="modal-actions"><button class="cancel" id="mCancel">취소</button><button class="confirm" id="mConfirm">추가</button></div>';
  modalBg.classList.add('open');
  document.getElementById('mCancel').addEventListener('click', closeModal);
  document.getElementById('mConfirm').addEventListener('click', async function(){
    var name = document.getElementById('fName').value.trim();
    var address = document.getElementById('fAddress').value.trim();
    if(!name || !address){ toast('상호명과 주소는 필수예요'); return; }
    var btn = document.getElementById('mConfirm');
    var orig = btn.textContent; btn.textContent = '위치 찾는 중...'; btn.disabled = true;
    var geo = await geocodeAddress(address);
    btn.textContent = orig; btn.disabled = false;
    if(!geo){ toast('주소로 위치를 찾지 못했어요'); return; }
    
    var newStore = {
      id: uid(), region: document.getElementById('fRegion').value.trim(), name: name,
      category: document.getElementById('fCategory').value.trim(), address: address,
      email: document.getElementById('fEmail').value.trim(), phone: document.getElementById('fPhone').value.trim(),
      gmapLink: document.getElementById('fGmap').value.trim(), status: document.getElementById('fStatus').value,
      rating: document.getElementById('fRating').value.trim(), reviewCount: document.getElementById('fReview').value.trim(),
      franchise: document.getElementById('fFranchise').value, lat: geo.lat, lng: geo.lng,
      visitStatus: 'unassigned', visitDate: null, assignee: null
    };
    saveStoreToDB(newStore);
    closeModal();
    toast(name+' 을(를) 등록했어요');
  });
});

function openEditModal(s){
  modal.innerHTML = '<h3>매장 정보 수정</h3>' + storeFormHtml(s) +
    '<div class="modal-actions"><button class="cancel" id="mCancel">취소</button><button class="confirm" id="mConfirm">저장</button></div>';
  modalBg.classList.add('open');
  document.getElementById('mCancel').addEventListener('click', closeModal);
  document.getElementById('mConfirm').addEventListener('click', async function(){
    var name = document.getElementById('fName').value.trim();
    var address = document.getElementById('fAddress').value.trim();
    if(!name || !address){ toast('상호명과 주소는 필수예요'); return; }
    var addressChanged = address !== s.address;
    var geo = { lat: s.lat, lng: s.lng };
    if(addressChanged){
      var btn = document.getElementById('mConfirm');
      var orig = btn.textContent; btn.textContent = '위치 다시 찾는 중...'; btn.disabled = true;
      var newGeo = await geocodeAddress(address);
      btn.textContent = orig; btn.disabled = false;
      if(newGeo) geo = newGeo;
    }
    s.region = document.getElementById('fRegion').value.trim();
    s.name = name;
    s.category = document.getElementById('fCategory').value.trim();
    s.address = address;
    s.email = document.getElementById('fEmail').value.trim();
    s.phone = document.getElementById('fPhone').value.trim();
    s.gmapLink = document.getElementById('fGmap').value.trim();
    s.status = document.getElementById('fStatus').value;
    s.rating = document.getElementById('fRating').value.trim();
    s.reviewCount = document.getElementById('fReview').value.trim();
    s.franchise = document.getElementById('fFranchise').value;
    s.lat = geo.lat; s.lng = geo.lng;
    
    saveStoreToDB(s);
    closeModal();
    toast(name+' 정보를 저장했어요');
  });
}

// ---------- clear all ----------
document.getElementById('clearBtn').addEventListener('click', function(){
  if(!confirm('정말 전체 매장을 삭제할까요? 모든 담당자 화면에서도 사라지고 되돌릴 수 없어요.')) return;
  clearAllStoresFromDB();
  toast('전체 삭제했어요');
});

// ---------- template download ----------
document.getElementById('templateBtn').addEventListener('click', function(){
  var header = ['지역','상호','업종','주소','이메일주소','전화번호','구글지도링크','영업상태','평점','리뷰수','프랜차이즈여부','위도','경도'];
  var example = ['CBD','스타커피 시드니점','카페','123 George St, Sydney NSW','store@example.com','0412345678','https://maps.google.com/?q=...','영업중','4.6','1240','Y','-33.8688','151.2093'];
  var ws = XLSX.utils.aoa_to_sheet([header, example]);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '업로드양식');
  XLSX.writeFile(wb, '매장_업로드_양식.xlsx');
  toast('업로드 양식을 다운로드했어요');
});

// ---------- export full status ----------
document.getElementById('exportBtn').addEventListener('click', function(){
  var stores = window.stores;
  if(stores.length === 0){ toast('등록된 매장이 없어요'); return; }
  var statusLabel = {unassigned:'미방문', today:'오늘 방문 예정', done:'방문완료'};
  var header = ['상태','담당자','지역','상호','업종','주소','이메일','전화번호','영업상태','평점','리뷰수','프랜차이즈여부','방문일','반응별점','메모'];
  var rows = stores.map(function(s){
    return [
      statusLabel[s.visitStatus]||s.visitStatus||'미방문', s.assignee||'', s.region||'', s.name||'', s.category||'',
      s.address||'', s.email||'', s.phone||'', s.status||'', s.rating||'', s.reviewCount||'',
      s.franchise==='Y'?'Y':'N', s.visitDate||'', s.visitRating||'', s.visitMemo||''
    ];
  });
  var ws = XLSX.utils.aoa_to_sheet([header].concat(rows));
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '전체현황');
  XLSX.writeFile(wb, '매장_전체현황_'+new Date().toLocaleDateString('sv-SE')+'.xlsx');
  toast(stores.length+'곳의 전체 현황을 다운로드했어요');
});

// ---------- excel upload (registration) ----------
document.getElementById('fileInput').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = async function(ev){
    try{
      var data = new Uint8Array(ev.target.result);
      var wb = XLSX.read(data, {type:'array'});
      var sheet = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      rows = rows.slice(1); // row 1 = title row, skip

      var toGeocode = [];
      var fastAdded = [];
      rows.forEach(function(r){
        var name = (r[1]||'').toString().trim();
        if(!name) return;
        var addr = (r[3]||'').toString().trim();
        var entry = {
          region:(r[0]||'').toString().trim(), name:name, category:(r[2]||'').toString().trim(), address:addr,
          email:(r[4]||'').toString().trim(), phone:(r[5]||'').toString().trim(), gmapLink:(r[6]||'').toString().trim(),
          status:(r[7]||'').toString().trim() || '영업중', rating:(r[8]||'').toString().trim(), reviewCount:(r[9]||'').toString().trim(),
          franchise:(r[10]||'').toString().trim().toUpperCase()==='Y' ? 'Y':'N'
        };
        var lat = parseFloat(r[11]), lng = parseFloat(r[12]);
        if(!isNaN(lat) && !isNaN(lng)){
          fastAdded.push(Object.assign({id:uid(), lat:lat, lng:lng, visitStatus:'unassigned', visitDate:null, assignee:null}, entry));
        } else if(addr){
          toGeocode.push(entry);
        }
      });

      if(fastAdded.length > 0){ 
        saveMultipleStoresToDB(fastAdded); 
        toast(fastAdded.length+'곳을 바로 추가했어요'); 
      }

      if(toGeocode.length === 0){
        if(fastAdded.length===0) toast('가져올 행이 없어요. D열(주소) 또는 L·M열(위도/경도)을 확인해주세요');
        return;
      }
      var added = 0, failed = 0;
      var geocodedBatch = [];
      for(var i=0;i<toGeocode.length;i++){
        toast('매장 위치 찾는 중… ('+(i+1)+'/'+toGeocode.length+')');
        var geo = await geocodeAddress(toGeocode[i].address);
        if(geo){
          geocodedBatch.push(Object.assign({id:uid(), lat:geo.lat, lng:geo.lng, visitStatus:'unassigned', visitDate:null, assignee:null}, toGeocode[i]));
          added++;
        } else { failed++; }
        if(i < toGeocode.length-1) await sleep(300);
      }
      saveMultipleStoresToDB(geocodedBatch);
      toast(added+'곳을 등록했어요'+(failed? ' ('+failed+'곳은 주소를 찾지 못함)':''));
    }catch(err){
      toast('파일을 읽는 중 오류가 발생했어요. 양식에 맞는지 확인해주세요');
    }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
});

})();
</script>

</html>
